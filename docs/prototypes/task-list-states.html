<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Star · 任务行状态（视觉契约）</title>
<style>
  :root{ font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; }
  body{ margin:0; background:#F2F2EF; color:#3D3D3D; }
  .page{ max-width:460px; margin:24px auto; padding:0 12px; }
  .panel{ background:#FAFAF8; border:1px solid #EFEFED; border-radius:16px; padding:16px; }
  .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .who{ display:flex; align-items:center; gap:8px; font-weight:500; }
  .ava{ width:30px; height:30px; border-radius:50%; background:#FFE3EC; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .pts{ display:flex; align-items:center; gap:5px; font-size:17px; font-weight:500; color:#C97A00; }
  .star{ color:#FFB300; }
  .hint{ font-size:12px; color:#A8A29A; margin:0 0 8px 2px; }
  .row{ display:flex; align-items:center; gap:12px; padding:14px; border-radius:14px; background:#fff; border:1px solid #ECECEC; margin-bottom:10px; cursor:pointer; transition:background .3s, border-color .3s; }
  .row.done{ background:#FFCC33; border-color:#FFCC33; }
  .emoji{ font-size:20px; flex:0 0 auto; }
  .mid{ flex:1; min-width:0; }
  .name{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:14px; color:#3D3D3D; }
  .row.done .name{ color:#5A4500; }
  .meta{ display:flex; align-items:center; gap:5px; font-size:12px; color:#A8A29A; margin-top:3px; }
  .row.done .meta{ color:#9A7A12; }
  .meta .s{ color:#FFB300; }
  .row.done .meta .s{ color:#8A6A10; }
  .act{ flex:0 0 auto; }
  .doneBtn{ background:#FFCC33; color:#6B5200; font-size:13px; font-weight:500; padding:7px 18px; border-radius:20px; }
  .check{ width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.55); display:flex; align-items:center; justify-content:center; color:#6B5200; font-size:17px; }
  .foot{ font-size:11px; color:#A8A29A; margin:6px 0 0 2px; }
</style>
</head>
<body>
<div class="page">
  <p class="hint">视觉契约：整体背景中性，黄色仅用于「Done 引导按钮」与「已完成任务整行高亮」。点行可切换状态。</p>
  <div class="panel">
    <div class="top">
      <div class="who"><span class="ava">👧</span><span>颢霖</span></div>
      <div class="pts">248 <span class="star">★</span></div>
    </div>

    <div class="row">
      <span class="emoji">🧹</span>
      <div class="mid"><div class="name">保持书桌整洁</div><div class="meta"><span class="s">★</span>6 · 0/1</div></div>
      <span class="act"><span class="doneBtn">Done</span></span>
    </div>

    <div class="row">
      <span class="emoji">📚</span>
      <div class="mid"><div class="name">完成作业</div><div class="meta"><span class="s">★</span>10 · 0/1</div></div>
      <span class="act"><span class="doneBtn">Done</span></span>
    </div>

    <div class="row done">
      <span class="emoji">📖</span>
      <div class="mid"><div class="name">主动阅读</div><div class="meta"><span class="s">★</span>2 · 1/2</div></div>
      <span class="act"><span class="check">✓</span></span>
    </div>

    <div class="row done">
      <span class="emoji">💗</span>
      <div class="mid"><div class="name">对家人说我爱你</div><div class="meta"><span class="s">★</span>3 · 已完成</div></div>
      <span class="act"><span class="check">✓</span></span>
    </div>

    <p class="foot">名字列定宽截断，完成前后行高一致；状态变化只发生在最右侧。</p>
  </div>
</div>
<script>
  document.querySelectorAll('.row').forEach(function(r){
    r.addEventListener('click', function(){
      var done = r.classList.toggle('done');
      var act = r.querySelector('.act');
      act.innerHTML = done ? '<span class="check">✓</span>' : '<span class="doneBtn">Done</span>';
    });
  });
</script>
</body>
</html>
