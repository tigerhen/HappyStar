<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>幸运星 - 成长计划原型</title>
<style>
  :root {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    --bg:#f3f3f0; --surface:#fff; --ink:#3f3d39; --muted:#8c8983;
    --line:#e7e7e2; --yellow:#ffcc33; --yellow-soft:#fff5c7;
    --yellow-ink:#6b5200; --pink:#ffe3ec; --pink-ink:#b14a6b;
    --blue:#e6f1fb; --blue-ink:#185fa5; --green:#dff2e5; --green-ink:#287647;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); }
  button { font:inherit; }
  .shell { width:min(100%, 470px); min-height:100vh; margin:auto; background:#fafaf8; }
  header { padding:18px 18px 14px; background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:3; }
  .top { display:flex; align-items:center; justify-content:space-between; }
  h1 { margin:0; font-size:20px; letter-spacing:0; }
  .back,.more { width:36px; height:36px; border:0; background:transparent; border-radius:50%; font-size:22px; color:var(--ink); }
  .switcher { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:14px; padding:4px; background:#efefeb; border-radius:8px; }
  .switcher button { border:0; padding:9px; border-radius:6px; background:transparent; color:var(--muted); font-weight:600; }
  .switcher .active { background:var(--surface); color:var(--pink-ink); box-shadow:0 1px 4px #00000012; }
  main { padding:16px 16px 92px; }
  .summary { padding:18px; background:var(--surface); border:1px solid var(--line); border-radius:8px; }
  .summary-head { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; }
  .eyebrow { margin:0 0 5px; color:var(--muted); font-size:12px; }
  h2 { margin:0; font-size:18px; letter-spacing:0; }
  .days { text-align:right; flex:none; color:var(--muted); font-size:12px; }
  .days strong { display:block; color:var(--ink); font-size:22px; }
  .big-progress { display:flex; align-items:end; gap:10px; margin-top:20px; }
  .percent { font-size:34px; line-height:1; font-weight:750; color:var(--pink-ink); }
  .track { height:10px; flex:1; margin-bottom:4px; border-radius:5px; background:#ecece8; overflow:hidden; }
  .fill { height:100%; width:58%; border-radius:inherit; background:var(--yellow); transition:width .35s ease; }
  .summary-meta { display:flex; justify-content:space-between; margin-top:9px; font-size:12px; color:var(--muted); }
  .notice { display:flex; align-items:center; gap:10px; margin-top:14px; padding:11px 12px; border-radius:7px; background:var(--yellow-soft); color:var(--yellow-ink); font-size:13px; }
  .notice b { white-space:nowrap; }
  .section-title { display:flex; justify-content:space-between; align-items:end; margin:22px 2px 10px; }
  .section-title h3 { margin:0; font-size:16px; }
  .section-title span { color:var(--muted); font-size:12px; }
  .subject { margin-bottom:10px; border:1px solid var(--line); border-radius:8px; background:var(--surface); overflow:hidden; }
  .subject-head { width:100%; display:grid; grid-template-columns:42px 1fr auto; align-items:center; gap:10px; padding:14px; border:0; background:transparent; text-align:left; color:var(--ink); }
  .subject-head:active { background:#f8f8f5; }
  .icon { width:40px; height:40px; display:grid; place-items:center; border-radius:8px; background:var(--pink); font-size:20px; }
  .subject.blue .icon { background:var(--blue); }
  .subject.green .icon { background:var(--green); }
  .subject-name { font-weight:650; font-size:15px; }
  .subject-sub { margin-top:3px; color:var(--muted); font-size:12px; }
  .subject-rate { font-size:14px; font-weight:700; color:var(--pink-ink); }
  .blue .subject-rate { color:var(--blue-ink); }
  .green .subject-rate { color:var(--green-ink); }
  .chev { color:var(--muted); margin-left:7px; display:inline-block; transition:transform .2s; }
  .subject.open .chev { transform:rotate(180deg); }
  .items { display:none; border-top:1px solid var(--line); padding:0 14px; }
  .subject.open .items { display:block; }
  .item { display:grid; grid-template-columns:1fr auto; gap:10px; padding:13px 0; border-bottom:1px solid #efefec; }
  .item:last-child { border-bottom:0; }
  .item-name { font-size:14px; }
  .item-info { margin-top:5px; display:flex; align-items:center; gap:8px; color:var(--muted); font-size:11px; }
  .mini-track { width:74px; height:5px; background:#ecece8; border-radius:3px; overflow:hidden; }
  .mini-fill { height:100%; background:var(--yellow); }
  .counter { display:flex; align-items:center; gap:6px; }
  .counter button { width:30px; height:30px; padding:0; border:1px solid var(--line); border-radius:50%; background:#fff; color:var(--ink); font-size:20px; line-height:1; }
  .counter button.plus { border-color:var(--yellow); background:var(--yellow); color:var(--yellow-ink); }
  .counter output { min-width:42px; text-align:center; font-size:13px; font-weight:700; }
  .stretch { display:inline-block; margin-left:6px; padding:2px 6px; background:var(--blue); color:var(--blue-ink); border-radius:4px; font-size:10px; }
  .deliverables { border:1px solid var(--line); border-radius:8px; background:#fff; padding:4px 14px; }
  .checkrow { display:flex; align-items:center; gap:11px; min-height:46px; border-bottom:1px solid #efefec; font-size:14px; cursor:pointer; }
  .checkrow:last-child { border-bottom:0; }
  .box { width:22px; height:22px; flex:none; display:grid; place-items:center; border:2px solid #c9c7c1; border-radius:50%; color:var(--yellow-ink); font-size:14px; }
  .checkrow.done .box { border-color:var(--yellow); background:var(--yellow); }
  .checkrow.done .label { text-decoration:line-through; color:var(--muted); }
  nav { position:fixed; z-index:4; left:50%; bottom:0; transform:translateX(-50%); width:min(100%,470px); height:68px; display:grid; grid-template-columns:repeat(3,1fr); background:#fff; border-top:1px solid var(--line); }
  nav button { border:0; background:transparent; color:var(--muted); font-size:11px; }
  nav span { display:block; margin-bottom:4px; font-size:21px; }
  nav .active { color:var(--yellow-ink); font-weight:700; }
  @media (min-width:800px) and (orientation:landscape) {
    .shell { width:min(100%,1000px); }
    main { display:grid; grid-template-columns:340px 1fr; gap:20px; align-items:start; }
    .summary { position:sticky; top:125px; }
    .content { min-width:0; }
    nav { width:min(100%,1000px); }
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="top"><button class="back" aria-label="返回">‹</button><h1>成长计划</h1><button class="more" aria-label="更多">⋯</button></div>
    <div class="switcher"><button class="active" data-child="haolin">颢霖</button><button data-child="zhongxian">仲贤</button></div>
  </header>
  <main>
    <section class="summary">
      <div class="summary-head">
        <div><p class="eyebrow">2026年暑假</p><h2 id="planTitle">颢霖的暑假成长计划</h2></div>
        <div class="days"><strong>28</strong>天后截止</div>
      </div>
      <div class="big-progress"><div class="percent" id="overall">58%</div><div class="track"><div class="fill" id="overallFill"></div></div></div>
      <div class="summary-meta"><span id="progressText">已完成 172 / 297 项</span><span>目标积分约 500 ⭐</span></div>
      <div class="notice"><b>今日建议</b><span id="noticeText">数学2项、语文2项、英语1项</span></div>
    </section>

    <div class="content">
      <div class="section-title"><h3>学习进度</h3><span>点击科目查看明细</span></div>
      <div id="subjects"></div>

      <div class="section-title"><h3>开学提交物</h3><span id="deliverRate">2 / 4 已备齐</span></div>
      <div class="deliverables" id="deliverables"></div>
    </div>
  </main>
  <nav><button><span>✓</span>任务</button><button class="active"><span>▥</span>计划</button><button><span>★</span>奖励</button></nav>
</div>
<script>
const plans = {
  haolin: {
    title:"颢霖的暑假成长计划", rate:58, done:172, total:297,
    notice:"数学2项、语文2项、英语1项",
    subjects:[
      {name:"数学", icon:"➗", tone:"", rate:61, sub:"84项 · 已完成51项", items:[["暑假作业",25,42],["口算打卡",26,42]]},
      {name:"语文", icon:"文", tone:"blue", rate:55, sub:"75项 · 已完成41项", items:[["童趣一夏·字帖",19,32],["诵读古今",9,16],["主题作文",1,3],["阅读训练",12,24]]},
      {name:"英语", icon:"A", tone:"green", rate:57, sub:"138项 · 已完成79项", items:[["《预习知新》",11,18],["阅读或完形填空",24,42],["英语电影",1,3],["五上前三单元预习",2,3],["三、四年级课本复习",41,72]]}
    ],
    delivers:[["主题作文3篇",false],["阅读训练24篇",true],["英语预习作业",false],["全部作业家长检查",true]]
  },
  zhongxian: {
    title:"仲贤的暑假成长计划", rate:46, done:79, total:171,
    notice:"练字1次、数学专项1次、阅读短文1篇",
    subjects:[
      {name:"语文", icon:"文", tone:"", rate:48, sub:"阅读、练字与两本书", items:[["阅读短文并摘抄",7,16],["每日练字",18,42],["《孤独的小螃蟹》",4,6],["《一只想飞的猫》",1,6]]},
      {name:"数学", icon:"➗", tone:"blue", rate:43, sub:"专项练习与实践作业", items:[["薄弱项专项练习",18,42],["认识身体尺",1,3],["数学阅读",1,3]]},
      {name:"英语与实践", icon:"A", tone:"green", rate:47, sub:"英语、美术和体育", items:[["26个字母操",14,26],["英语绘本朗读",1,2],["参观美术展",0,1],["每周跳绳",11,24],["户外探索",2,4],["观看一场比赛",1,1]]}
    ],
    delivers:[["摘抄本",true],["阅读短文16篇",false],["两本书的导读单",false],["字帖",true]]
  }
};
let current="haolin";
function render(){
  const p=plans[current];
  planTitle.textContent=p.title; overall.textContent=p.rate+"%"; overallFill.style.width=p.rate+"%";
  progressText.textContent=`已完成 ${p.done} / ${p.total} 项`; noticeText.textContent=p.notice;
  subjects.innerHTML=p.subjects.map((s,si)=>`<section class="subject ${s.tone} ${si===0?'open':''}">
    <button class="subject-head"><span class="icon">${s.icon}</span><span><span class="subject-name">${s.name}</span><span class="subject-sub">${s.sub}</span></span><span class="subject-rate">${s.rate}% <i class="chev">⌄</i></span></button>
    <div class="items">${s.items.map((it,ii)=>`<div class="item"><div><div class="item-name">${it[0]}${it[0].includes('绘本')?'<span class="stretch">第2本为拓展</span>':''}</div><div class="item-info"><span class="mini-track"><span class="mini-fill" style="display:block;width:${Math.round(it[1]/it[2]*100)}%"></span></span><span>${Math.round(it[1]/it[2]*100)}%</span></div></div><div class="counter"><button class="minus" data-s="${si}" data-i="${ii}" aria-label="减少">−</button><output>${it[1]}/${it[2]}</output><button class="plus" data-s="${si}" data-i="${ii}" aria-label="增加">＋</button></div></div>`).join('')}</div>
  </section>`).join('');
  deliverables.innerHTML=p.delivers.map((d,i)=>`<div class="checkrow ${d[1]?'done':''}" data-d="${i}"><span class="box">${d[1]?'✓':''}</span><span class="label">${d[0]}</span></div>`).join('');
  const dc=p.delivers.filter(d=>d[1]).length; deliverRate.textContent=`${dc} / ${p.delivers.length} 已备齐`;
  bind();
}
function bind(){
  document.querySelectorAll('.subject-head').forEach(b=>b.onclick=()=>b.parentElement.classList.toggle('open'));
  document.querySelectorAll('.counter button').forEach(b=>b.onclick=e=>{e.stopPropagation();const it=plans[current].subjects[+b.dataset.s].items[+b.dataset.i];it[1]=Math.max(0,Math.min(it[2],it[1]+(b.classList.contains('plus')?1:-1)));render();});
  document.querySelectorAll('.checkrow').forEach(r=>r.onclick=()=>{plans[current].delivers[+r.dataset.d][1]=!plans[current].delivers[+r.dataset.d][1];render();});
}
document.querySelectorAll('.switcher button').forEach(b=>b.onclick=()=>{current=b.dataset.child;document.querySelectorAll('.switcher button').forEach(x=>x.classList.toggle('active',x===b));render();});
render();
</script>
</body>
</html>
